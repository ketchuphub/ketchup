# Before going live: search-replace OWNER and REPO below with your
# GitHub owner and repo name.

site_name: Ketchup
site_description: Daily catch-up reports
site_author: OWNER
site_url: https://OWNER.github.io/REPO/

repo_name: OWNER/REPO
repo_url: https://github.com/OWNER/REPO
edit_uri: ""

docs_dir: docs

theme:
  name: material
  logo: assets/ketchup.png
  favicon: assets/ketchup.png
  features:
  - navigation.instant
  - navigation.tracking
  - navigation.top
  - navigation.footer
  - search.suggest
  - search.highlight
  - content.code.copy
  - toc.follow
  palette:
  - media: "(prefers-color-scheme: light)"
    scheme: default
    primary: red
    accent: deep orange
    toggle:
      icon: material/brightness-7
      name: Switch to dark mode
  - media: "(prefers-color-scheme: dark)"
    scheme: slate
    primary: red
    accent: deep orange
    toggle:
      icon: material/brightness-4
      name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github

extra_css:
- css/extra.css

extra_javascript:
- javascripts/title-link.js

hooks:
- hooks/build_reports.py

markdown_extensions:
- abbr
- admonition
- attr_list
- def_list
- md_in_html
- toc:
    permalink: true
- pymdownx.betterem
- pymdownx.magiclink:
    repo_url_shorthand: true
    user: OWNER
    repo: REPO
- pymdownx.superfences
- pymdownx.tasklist:
    custom_checkbox: true
    clickable_checkbox: false

plugins:
- search
- awesome-pages

extra:
  social:
  - icon: fontawesome/brands/github
    link: https://github.com/OWNER/REPO
    name: Ketchup on GitHub
