name: Ketchup

on:
  schedule:
  - cron: '0 7 * * *'
  workflow_dispatch:

concurrency:
  group: pages-publish
  cancel-in-progress: false

jobs:
  ketchup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: ketchuphub/ketchup-action@v1
      with:
        claude-credentials: ${{ secrets.CLAUDE_CREDENTIALS }}
        github-token: ${{ secrets.KETCHUP_TOKEN }}

  publish-www:
    needs: ketchup
    if: always() && needs.ketchup.result != 'cancelled'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0
    - name: Configure git identity
      run: |
        git config --global user.name "ketchup-bot"
        git config --global user.email "ketchup-bot@users.noreply.github.com"
    - name: Publish to gh-pages
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        make publish \
          REPO="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
